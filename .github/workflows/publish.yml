name: Deploy Worker

on:
  push:
    branches:
      - production

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      # ✅ Fix npm version (tránh lỗi EBADENGINE)
      - name: Use npm 10
        run: npm install -g npm@10

      - name: Verify versions
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci

      # 🚀 Deploy Worker
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 🔔 Notify khi lỗi
      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ Deploy Worker failed\nRepo: ${{ github.repository }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
