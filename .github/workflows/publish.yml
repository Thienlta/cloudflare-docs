name: Deploy Astro + React

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Astro/Vite
        uses: actions/cache@v4
        with:
          path: |
            .astro
            node_modules/.astro
          key: build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: npm run build

      - name: Verify dist
        run: test -d dist

      - name: Deploy
        run: npx wrangler@3 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ Deploy failed\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
