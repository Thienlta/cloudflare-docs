on: [push, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'production') }}

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    name: Publish to Cloudflare Pages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      # ✅ Restore static cache
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules/.astro/_astro
            node_modules/.astro/assets
          key: static

      # ✅ Separate step for your rclone + zip logic
      - name: Upload markdown and LLMs
        run: |
          cd distmd && zip -r markdown.zip .
          rclone copy \
            --config ../bin/rclone.conf \
            ./markdown.zip \
            devdocs:vendored-markdown
          rm markdown.zip
          cd ..
          cd distllms
          for file in $(find . -type f); do
            rclone copy \
              --config ../bin/rclone.conf \
              $file \
              devdocs:vendored-markdown
          done

      - name: Build Astro
        run: npx astro build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy --project-name cloudflare-docs dist
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ Save Astro cache for next runs
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules/.astro/_astro
            node_modules/.astro/assets
          key: static
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ Deploy preview Workers build
      - name: Deploy to Cloudflare Workers [preview]
        if: github.ref != 'refs/heads/production'
        run: npm run build:worker && npx wrangler versions upload -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ Always save cache at the end
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            node_modules/.astro/_astro
            node_modules/.astro/assets
          key: static
