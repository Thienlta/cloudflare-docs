name: Publish

on:
  push:
    branches:
      - production

jobs:
  publish:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      # ⚡ Cache Astro
      - name: Cache Astro
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: npm run build

      - name: Verify dist
        run: test -d dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: dist

      - name: Deploy
        run: npx wrangler@3 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ Deploy failed\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
