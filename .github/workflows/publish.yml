name: Publish

on:
  push:
    branches:
      - production

jobs:
  publish:
    name: Production
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=4096
      ASTRO_TELEMETRY_DISABLED: 1

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. ✅ FIX Node (ổn định nhất)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ❌ BỎ cache node_modules (tránh conflict)
      # giữ npm cache là đủ

      # 3. Install
      - name: Install dependencies
        run: npm ci

      # 4. Cache Astro assets (giữ lại OK)
      - name: Restore Astro assets
        uses: actions/cache@v4
        with:
          path: node_modules/.astro/assets
          key: astro-assets-${{ hashFiles('src/assets/**') }}
          restore-keys: |
            astro-assets-

      # 5. Build
      - name: Build
        run: npm run build

      # 6. 🚀 Deploy Cloudflare Pages (FIX QUAN TRỌNG)
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@latest pages deploy dist \
            --project-name=cloudflare-docs \
            --branch=production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 7. Upload artifact (optional)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: site-html
          path: dist

      # 8. 🔔 Notify khi fail
      - name: Notify Google Chat on failure
        if: failure()
        run: |
          MESSAGE="❌ Publish Production failed
          Repo: ${{ github.repository }}
          Actor: ${{ github.actor }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$MESSAGE\"}"
