name: Deploy Astro Hybrid

on: [push, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'production') }}

jobs:
  publish:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ⚡ Cache Astro
      - uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify dist
        run: test -d dist

      # 🌐 Deploy Pages (main)
      - name: Deploy Pages
        run: npx wrangler@3 pages deploy dist --project-name cloudflare-docs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ⚡ Deploy Worker (preview only)
      - name: Deploy Worker
        if: github.ref_name != 'production'
        run: npx wrangler@3 versions upload -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 💾 Save cache
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
