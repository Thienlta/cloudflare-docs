name: Deploy Docs (Future-proof)

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 🔥 Node version lấy từ .nvmrc
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # 🔥 Auto fix npm version theo engines
      - name: Sync npm version
        run: |
          if [ -f package.json ]; then
            NPM_VERSION=$(node -p "require('./package.json').engines?.npm || ''")
            if [ ! -z "$NPM_VERSION" ]; then
              echo "Using npm@$NPM_VERSION"
              npm install -g npm@$NPM_VERSION
            fi
          fi

      - name: Verify versions
        run: node -v && npm -v

      - name: Install deps
        run: npm ci

      # ⚡ Cache Astro
      - uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: npm run build

      - name: Verify dist
        run: test -d dist

      - name: Deploy Pages
        run: npx wrangler@3 pages deploy dist --project-name your-project
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
