name: Publish to Cloudflare Pages

on: [push, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'production') }}

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    name: Publish to Cloudflare Pages

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      VITE_CONCURRENCY: 2
      ASTRO_DISABLE_PARALLEL_BUILD: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: |
          echo "Starting Astro build..."
          npx astro build

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@3 pages deploy dist \
            --project-name cloudflare-docs \
            --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build & Deploy Cloudflare Worker
        if: github.ref != 'refs/heads/production'
        run: |
          npm run build:worker
          npx wrangler@3 deploy -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
