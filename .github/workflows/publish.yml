name: Deploy Pages (Production)

on:
  push:
    branches:
      - production
      - staging   # 👉 có preview

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=4096
      CI: true

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node + cache đúng chuẩn
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install (reproducible)
      - name: Install dependencies
        run: npm ci

      # 4. Build
      - name: Build
        run: npm run build

      # 5. Deploy Pages (production + preview)
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@latest pages deploy dist \
            --project-name=${{ secrets.CF_PAGES_PROJECT }} \
            --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 6. Upload artifact (debug / rollback)
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist

      # 7. Notify failure
      - name: Notify failure
        if: failure()
        run: |
          MESSAGE="❌ Deploy FAILED
          Branch: ${{ github.ref_name }}
          Repo: ${{ github.repository }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$MESSAGE\"}"
