name: Publish to Cloudflare Pages

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'production') }}

jobs:
  publish:
    runs-on: ubuntu-22.04
    name: Deploy Cloudflare Docs

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      VITE_CONCURRENCY: 2
      ASTRO_DISABLE_PARALLEL_BUILD: true
      npm_config_engine_strict: false
      ASTRO_TELEMETRY_DISABLED: 1

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (Astro yêu cầu >=22)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      # 3. Debug environment
      - name: Show environment info
        run: |
          node -v
          npm -v

      # 4. Install dependencies (fix EBADENGINE)
      - name: Install dependencies
        run: npm ci --engine-strict=false

      # 5. Sync Astro (tránh lỗi postinstall fail)
      - name: Astro sync
        run: npx astro sync

      # 6. Build site
      - name: Build Astro site
        run: |
          echo "🚀 Building Astro..."
          npx astro build --verbose

      # 7. Deploy Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@3 pages deploy dist \
            --project-name cloudflare-docs \
            --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 8. Deploy Worker (non-production)
      - name: Deploy Cloudflare Worker
        if: github.ref != 'refs/heads/production'
        run: |
          npm run build:worker
          npx wrangler@3 deploy -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 9. Debug nếu fail
      - name: Debug on failure
        if: failure()
        run: |
          echo "===== DEBUG ====="
          node -v
          npm -v
          free -h
          df -h
