name: Publish to Cloudflare Pages

on: [push, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'production')}}

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    name: Publish to Cloudflare Pages

    env:
      # ✅ Tăng bộ nhớ Node.js lên 8GB
      NODE_OPTIONS: --max-old-space-size=8192
      # ✅ Giảm tải song song của Vite/Astro
      VITE_CONCURRENCY: 2
      # ✅ Giảm tối đa số worker (Astro build sẽ nhẹ hơn)
      ASTRO_DISABLE_PARALLEL_BUILD: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ✅ Cache build output (nếu có)
      - uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro/_astro
            node_modules/.astro/assets
          key: static-${{ github.ref }}
          restore-keys: |
            static-

      - name: Build Astro site
        run: |
          echo "Starting Astro build with increased memory..."
          npx astro build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy --project-name cloudflare-docs dist
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ Chỉ build worker khi không phải nhánh production
      - name: Build & Deploy Cloudflare Worker
        if: github.ref != 'refs/heads/production'
        run: |
          npm run build:worker
          npx wrangler versions upload -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
