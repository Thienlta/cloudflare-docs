name: Deploy Docs (Cloudflare Pages)

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ⚡ Cache Astro build
      - name: Cache Astro
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: npm run build

      - name: Verify dist
        run: test -d dist

      # 🚀 Deploy to Cloudflare Pages
      - name: Deploy to Pages
        run: npx wrangler@3 pages deploy dist --project-name your-project-name
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ Deploy Docs failed\nRepo: ${{ github.repository }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
