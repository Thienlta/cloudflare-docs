name: Publish Cloudflare Docs C5S

on:
  push:
    branches:
      - main
      - production

jobs:
  publish:
    name: Deploy
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      ASTRO_TELEMETRY_DISABLED: 1

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup pnpm
      - uses: pnpm/action-setup@v3
        with:
          version: 10

      # 3. Setup Node 24 (đúng với engines của bạn)
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      # 4. Install deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build Astro
      - name: Build site
        run: pnpm run build

      # 6. Deploy Pages (QUAN TRỌNG)
      - name: Deploy to Cloudflare Pages
        run: |
          pnpm exec wrangler pages deploy dist \
            --project-name cloudflare-docs-c5s \
            --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 7. (Optional) Deploy Worker nếu có
      - name: Deploy Worker
        if: success()
        run: pnpm exec wrangler deploy -c wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 8. Debug nếu fail
      - name: Debug
        if: failure()
        run: |
          node -v
          pnpm -v
          free -h
