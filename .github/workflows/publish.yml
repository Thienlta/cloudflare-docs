name: Publish

on:
  push:
    branches:
      - production

jobs:
  publish:
    name: Production
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      ASTRO_TELEMETRY_DISABLED: 1

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. ✅ Fix Node version
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      # 3. Cache node_modules
      - name: Restore node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      # 4. Cache Astro assets (giữ lại OK)
      - name: Restore Astro assets
        uses: actions/cache@v4
        with:
          path: node_modules/.astro/assets
          key: astro-assets-${{ hashFiles('src/assets/**') }}
          restore-keys: |
            astro-assets-

      # 5. Build
      - name: Build
        run: npm run build

      # 6. 🚀 Deploy Pages (FIX QUAN TRỌNG)
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@3 pages deploy dist \
            --project-name cloudflare-docs \
            --branch=production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 7. Upload artifact (optional)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: site-html
          path: dist

      # 8. 🔔 Notify Google Chat khi fail
      - name: Notify Google Chat on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          MESSAGE="❌ Publish Production failed\nActor: $ACTOR\nhttps://github.com/$REPO/actions/runs/$RUN_ID"
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MESSAGE\"}"
