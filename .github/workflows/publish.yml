name: Publish Production (cloudflare-docs)

on:
  push:
    branches:
      - production

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Production Deploy
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      ASTRO_TELEMETRY_DISABLED: 1

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      # 3. Setup Node (phù hợp Astro + engines)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      # 4. Verify environment
      - name: Debug environment
        run: |
          node -v
          pnpm -v

      # 5. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 6. Build Astro site
      - name: Build site
        run: |
          echo "🚀 Building Astro..."
          pnpm run build

      # 7. Deploy Cloudflare Pages (QUAN TRỌNG)
      - name: Deploy to Cloudflare Pages
        run: |
          pnpm exec wrangler pages deploy dist \
            --project-name cloudflare-docs-c5s \
            --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 8. Deploy Worker (middleware / API)
      - name: Deploy Worker
        run: |
          pnpm exec wrangler deploy -c wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 9. Upload artifact (debug)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: dist
          if-no-files-found: ignore

      # 10. Debug nếu lỗi
      - name: Debug on failure
        if: failure()
        run: |
          echo "===== DEBUG INFO ====="
          node -v
          pnpm -v
          free -h
          df -h
