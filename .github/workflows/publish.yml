on: [push, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'production')}}

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    name: Publish to Cloudflare Pages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      # ✅ Restore Astro cache
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules/.astro/_astro
            node_modules/.astro/assets
          key: static

      # ✅ Build Astro
      - name: Build Astro
        run: npx astro build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # ✅ Install rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # ✅ Optional: Debug dist folder content (an toàn để xoá nếu không cần)
      - name: Show dist folders
        run: |
          echo "📁 dist directory contents:"
          ls -R dist || true
          echo "📁 distmd directory contents:"
          ls -R distmd || true
          echo "📁 distllms directory contents:"
          ls -R distllms || true

      # ✅ Upload markdown + LLMs if present
      - name: Upload markdown and LLMs
        run: |
          if [ -d "distmd" ]; then
            echo "🗂 Uploading markdown..."
            cd distmd
            zip -r markdown.zip .
            rclone copy \
              --config ../bin/rclone.conf \
              ./markdown.zip \
              devdocs:vendored-markdown
            rm markdown.zip
            cd ..
          else
            echo "⚠️ distmd folder not found, skipping markdown upload"
          fi

          if [ -d "distllms" ]; then
            echo "🧠 Uploading LLM files..."
            cd distllms
            find . -type f | while read file; do
              rclone copy \
                --config ../bin/rclone.conf \
                "$file" \
                devdocs:vendored-markdown
            done
            cd ..
          else
            echo "⚠️ distllms folder not found, skipping LLM upload"
          fi

      # ✅ Deploy to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy --project-name cloudflare-docs dist
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ Deploy to Cloudflare Workers (production)
      - name: Deploy to Cloudflare Workers [production]
        if: github.ref == 'refs/heads/production'
        run: npm run build:worker && npx wrangler deploy -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ Deploy to Cloudflare Workers (preview)
      - name: Deploy to Cloudflare Workers [preview]
        if: github.ref != 'refs/heads/production'
        run: npm run build:worker && npx wrangler versions upload -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ Save Astro cache for next runs
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            node_modules/.astro/_astro
            node_modules/.astro/assets
          key: static
