name: Publish to Cloudflare Pages

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'production') }}

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    name: Publish to Cloudflare Pages

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      VITE_CONCURRENCY: 2
      ASTRO_DISABLE_PARALLEL_BUILD: true
      npm_config_engine_strict: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Show environment info
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --engine-strict=false

      - name: Build Astro site
        run: |
          echo "Starting Astro build..."
          npx astro build --verbose

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@3 pages deploy dist \
            --project-name cloudflare-docs \
            --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build & Deploy Cloudflare Worker
        if: github.ref != 'refs/heads/production'
        run: |
          npm run build:worker
          npx wrangler@3 deploy -c ./wrangler-workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Debug on failure
        if: failure()
        run: |
          echo "===== DEBUG INFO ====="
          node -v
          npm -v
          free -h
          df -h
