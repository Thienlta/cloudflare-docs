name: Deploy

on:
  push:
    branches:
      - production
      - staging
  pull_request:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=8192
  ASTRO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  deploy:
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      pull-requests: write

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Node + cache npm (auto)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install (FAST)
      - name: Install dependencies
        run: npm ci

      # 4. 🔥 Cache Astro (quan trọng nhất)
      - name: Cache Astro
        uses: actions/cache@v4
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('astro.config.*') }}
          restore-keys: |
            astro-${{ runner.os }}-

      # 5. Cache assets
      - name: Cache Astro assets
        uses: actions/cache@v4
        with:
          path: node_modules/.astro/assets
          key: astro-assets-${{ hashFiles('src/assets/**') }}
          restore-keys: |
            astro-assets-

      # 6. 🔥 Cache Wrangler
      - name: Cache Wrangler
        uses: actions/cache@v4
        with:
          path: |
            ~/.wrangler
            .wrangler
          key: wrangler-${{ runner.os }}-${{ hashFiles('wrangler.toml') }}
          restore-keys: |
            wrangler-${{ runner.os }}-

      # 7. Build
      - name: Build
        run: npm run build

      # =========================
      # 🚀 Deploy logic
      # =========================
      - name: Deploy
        id: deploy
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="pr-${{ github.event.number }}"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            BRANCH="staging"
          else
            BRANCH="production"
          fi

          echo "Deploy branch: $BRANCH"

          npx wrangler@3 pages deploy dist \
            --project-name cloudflare-docs \
            --branch=$BRANCH
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # =========================
      # 💬 Comment PR preview
      # =========================
      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://pr-${pr}.cloudflare-docs.pages.dev`;

            github.rest.issues.createComment({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview ready: ${url}`
            });

      # =========================
      # 🔔 Notify fail
      # =========================
      - name: Notify Google Chat on failure
        if: failure()
        run: |
          MESSAGE=$(cat <<EOF
❌ Deploy failed
Repo: ${{ github.repository }}
Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
EOF
)

          curl -s -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            --data-urlencode "payload={\"text\": \"$MESSAGE\"}"
