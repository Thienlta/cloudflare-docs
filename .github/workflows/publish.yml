name: Publish (Cloudflare Pages)

on:
  push:
    branches:
      - production

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Production
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=4096
      ASTRO_TELEMETRY_DISABLED: 1
      CI: true

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node + pnpm
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack (pnpm)
        run: corepack enable

      # 3. Install dependencies (CHUẨN pnpm)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. Cache Astro assets (optional nhưng tốt)
      - name: Restore Astro assets
        uses: actions/cache@v4
        with:
          path: node_modules/.astro/assets
          key: astro-assets-${{ hashFiles('src/assets/**') }}
          restore-keys: |
            astro-assets-

      # 5. Build docs
      - name: Build
        run: pnpm build

      # 6. 🚀 Deploy Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@latest pages deploy dist \
            --project-name=${{ secrets.CF_PAGES_PROJECT }} \
            --branch=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 7. Upload artifact (debug)
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      # 8. Notify (optional - có thể bỏ)
      - name: Notify failure
        if: failure() && secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK != ''
        run: |
          MESSAGE="❌ Deploy FAILED
          Repo: ${{ github.repository }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST "${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$MESSAGE\"}"
